components:
  schemas:
    ActionEnum:
      enum:
      - CREATE
      - UPDATE
      - DELETE
      type: string
      description: |-
        * `CREATE` - Create
        * `UPDATE` - Update
        * `DELETE` - Delete
    AttendanceLog:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/GisFeatureEnum'
        id:
          type: integer
          readOnly: true
        geometry:
          type: object
          properties:
            type:
              type: string
              enum:
              - Point
            coordinates:
              type: array
              items:
                type: number
                format: float
              example:
              - 12.9721
              - 77.5933
              minItems: 2
              maxItems: 3
        properties:
          type: object
          properties:
            date:
              type: string
              format: date
            check_in:
              type: string
              format: time
              nullable: true
            check_out:
              type: string
              format: time
              nullable: true
            has_gloves:
              type: boolean
            has_mask:
              type: boolean
            has_vest:
              type: boolean
            has_boots:
              type: boolean
            ppe_selfie:
              type: string
              format: uri
              nullable: true
            ppe_photo_url:
              type: string
              format: uri
              nullable: true
              description: Verifiable remote URL for PPE selfie
              maxLength: 500
            status:
              enum:
              - PRESENT
              - ABSENT
              - LEAVE
              type: string
              description: |-
                * `PRESENT` - Present
                * `ABSENT` - Absent
                * `LEAVE` - Leave
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true
            worker:
              type: string
              format: uuid
    AttendanceLogList:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/GisFeatureCollectionEnum'
        features:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceLog'
    AttendanceLogRequest:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/GisFeatureEnum'
        geometry:
          type: object
          properties:
            type:
              type: string
              enum:
              - Point
            coordinates:
              type: array
              items:
                type: number
                format: float
              example:
              - 12.9721
              - 77.5933
              minItems: 2
              maxItems: 3
        properties:
          type: object
          properties:
            date:
              type: string
              format: date
            check_in:
              type: string
              format: time
              nullable: true
            check_out:
              type: string
              format: time
              nullable: true
            has_gloves:
              type: boolean
            has_mask:
              type: boolean
            has_vest:
              type: boolean
